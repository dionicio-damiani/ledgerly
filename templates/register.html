<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ledgerly — Create account</title>
  <link rel="stylesheet" href="/static/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body {
      background:
        radial-gradient(ellipse 60% 50% at 50% 0%, rgba(91, 106, 240, 0.14) 0%, transparent 60%),
        var(--bg);
    }

    .topbar {
      background: transparent;
      border-bottom-color: rgba(255, 255, 255, 0.06);
    }

    .auth-card {
      border-top: 3px solid var(--accent);
      padding: 40px 36px;
      box-shadow: 0 12px 36px rgba(0, 0, 0, 0.35);
    }

    .auth-card .card-title {
      font-family: 'Sora', var(--font);
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      text-transform: none;
      color: var(--text);
    }

    .auth-card .card-title::before {
      display: none;
    }

    .auth-subtitle {
      margin-top: 6px;
      font-size: 0.9rem;
      color: var(--text-mid);
      line-height: 1.6;
      max-width: 34ch;
    }

    .auth-form {
      gap: 20px;
      margin-top: 28px;
    }

    .auth-form input:focus {
      box-shadow: 0 0 0 3px rgba(var(--accent-rgb), 0.12);
    }

    @media (max-width: 480px) {
      .auth-card { padding: 28px 22px; }
      .auth-card .card-title { font-size: 1.35rem; }
    }
  </style>
</head>
<body>

<header class="topbar">
  <a class="brand-wordmark" href="/">Ledgerly</a>
</header>

<main class="auth-shell">
  <section class="card auth-card">
    <div class="card-header">
      <h2 class="card-title">Create account</h2>
    </div>
    <p class="auth-subtitle">Start generating professional invoices and quotes in seconds.</p>

    <div id="auth-error" class="auth-error" style="display:none;"></div>

    <form id="register-form" class="auth-form">
      <div class="field">
        <label for="email">Email <span class="required">*</span></label>
        <input type="email" id="email" name="email" required placeholder="you@example.com" />
      </div>
      <div class="field">
        <label for="password">Password <span class="required">*</span></label>
        <input type="password" id="password" name="password" required placeholder="••••••••" />
      </div>
      <div class="field">
        <label for="confirm_password">Confirm password <span class="required">*</span></label>
        <input type="password" id="confirm_password" name="confirm_password" required placeholder="••••••••" />
      </div>

      <button class="btn-generate" type="submit" id="btn-register">
        <div class="spinner"></div>
        <span class="btn-label">Create account</span>
      </button>
    </form>

    <p class="auth-switch">Already have an account? <a href="/login">Log in</a></p>
  </section>
</main>

<script src="/static/auth.js"></script>
</body>
</html>
