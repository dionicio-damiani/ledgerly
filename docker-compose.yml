services:
  app:
    build: .
    image: smart-invoice-generator:local
    container_name: smart-invoice-generator
    ports:
      - "8000:8000"
    environment:
      LOG_LEVEL: INFO
      CORS_ORIGINS: "*"
      RATE_LIMIT_GENERATE: "30/minute"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
